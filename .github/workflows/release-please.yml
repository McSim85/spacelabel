name: Release Please

# Maintains the release PR: on every push to main, release-please accumulates
# Conventional Commit messages into CHANGELOG.md and bumps version in
# pyproject.toml.  When the release PR is merged, the action creates the git
# tag and a GitHub Release — which then triggers publish.yml.
#
# Ref: https://github.com/googleapis/release-please-action

on:
  push:
    branches:
      - main

permissions:
  contents: write       # create tags + GitHub Release
  pull-requests: write  # create/update the release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # "python" release type: bumps `version = "..."` in pyproject.toml
          # and populates CHANGELOG.md from Conventional Commits.
          release-type: python
          # PAT required so the published release event triggers publish.yml.
          # GITHUB_TOKEN releases are attributed to Actions and don't fire
          # downstream workflow triggers (GitHub loop-prevention policy).
          # Create a fine-grained PAT with Contents + Pull Requests write,
          # add as repo secret RELEASE_PAT.
          token: ${{ secrets.RELEASE_PAT || github.token }}
